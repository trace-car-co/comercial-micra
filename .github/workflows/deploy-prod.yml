name: Deploy in cloudfront production

on:
    push:
        branches:
            - main

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v2

            - name: Set up Node.js
              uses: actions/setup-node@v2
              with:
                  node-version: "20"

            - name: Download .env file from S3
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              run: aws s3 cp s3://environments-trace-prod/front-carintegrado/.env .env

            - name: Install dependencies
              run: yarn install

            - name: Build the React app
              run: ls -a && CI=false yarn run build

            - name: Deploy to S3
              uses: jakejarvis/s3-sync-action@v0.5.1
              with:
                  args: --acl private --follow-symlinks --delete
              env:
                  AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET_PDN }}
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  SOURCE_DIR: "dist"

            - name: invalidate cloudfront cache
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              run: aws cloudfront create-invalidation --distribution-id ${{ vars.DISTRIBUTION_PDN }} --paths "/*" "/"
