          "acceptedAnswer": {
            "@type": "Answer",
            "text": "MICRA es una empresa de base tecnológica que gestiona integralmente los procesos metrológicos de su empresa. Combinamos servicios especializados de calibración de equipos con una plataforma digital que centraliza certificados de calibración, calendarios y dashboards de cumplimiento en tiempo real."
          }
        },
        {
          "@type": "Question",
          "name": "¿Necesito experiencia en metrología para usar la plataforma?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. La plataforma de metrología fue diseñada para ser intuitiva. Nuestro equipo se encarga de toda la gestión técnica de calibración. Usted solo necesita acceder para consultar el estado de sus equipos de medición, descargar certificados de calibración y recibir alertas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Con cuáles laboratorios acreditados trabajan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Trabajamos con una red de más de 200 laboratorios acreditados por ONAC en Colombia, cubriendo todas las magnitudes físicas: masa, temperatura, presión, longitud, fuerza, corriente, entre otras. Todos con calibración acreditada y trazabilidad metrológica certificada."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto tiempo toma la implementación del sistema de gestión metrológica?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El onboarding básico toma entre 1 y 2 semanas, dependiendo del tamaño de su parque de equipos. Incluye carga de inventario de instrumentos de medición, configuración de calendarios de calibración y capacitación a su equipo."
          }
        },
        {
          "@type": "Question",
          "name": "¿MICRA cumple con la norma ISO/IEC 10012?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Nuestros procesos de gestión metrológica están alineados con los requisitos de la norma ISO/IEC 10012: Sistemas de gestión de medidas — Requisitos para procesos de medición y equipos de medición."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué pasa si un equipo de medición está próximo a vencer su calibración?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "La plataforma envía alertas automáticas cuando un equipo está próximo a vencer su calibración. Además, nuestro equipo coordina proactivamente el servicio de calibración con el laboratorio acreditado ONAC correspondiente."
          }
        },

          "@type": "Question",

            "@type": "Answer",
